name: Deploy to Firebase Hosting

on:
  push:
  pull_request:

jobs:
  lint_and_format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: ./public
        run: npm ci

      - name: Lint
        working-directory: ./public
        run: npm run lint

      - name: Format check
        working-directory: ./public
        run: npm run format

  test_publisher:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: publisher/package-lock.json

      - name: Install dependencies
        run: |
          cd publisher
          npm ci

      - name: Run tests
        run: |
          cd publisher
          npm test

  test_worker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'worker/requirements-test.txt'

      - name: Install test dependencies
        run: |
          cd worker
          pip install -r requirements-test.txt

      - name: Run tests with pytest
        run: |
          cd worker
          pytest test_vlm_utils.py -v --tb=short

      - name: Display test summary
        if: always()
        run: |
          cd worker
          pytest test_vlm_utils.py --tb=line --no-header -q

  build_and_deploy:
    needs: [lint_and_format, test_publisher, test_worker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: ./public
        run: npm ci

      - name: Build
        working-directory: ./public
        run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_DANBOORU_ML_CLASSIFIER }}"
          channelId: live
          projectId: danbooru-ml-classifier
