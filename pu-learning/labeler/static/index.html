<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Labeler</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #111;
    color: #eee;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #progress-text { font-size: 13px; color: #aaa; white-space: nowrap; }
  #progress-bar-wrap {
    flex: 1; min-width: 120px; height: 6px;
    background: #333; border-radius: 3px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; background: #4ade80;
    transition: width 0.3s; border-radius: 3px;
  }
  #filter-tabs { display: flex; gap: 4px; }
  .tab-btn {
    padding: 3px 10px; border-radius: 4px; border: 1px solid #444;
    background: #222; color: #ccc; font-size: 12px; cursor: pointer;
  }
  .tab-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }

  /* ── Sub-filter bar (labeled tab) ── */
  #subbar {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 5px 16px;
    background: #141414;
    border-bottom: 1px solid #2a2a2a;
    flex-shrink: 0;
  }
  #subbar.visible { display: flex; }
  #subbar-label { font-size: 11px; color: #555; white-space: nowrap; }
  .sub-tab {
    padding: 2px 10px; border-radius: 4px; border: 1px solid #383838;
    background: #1c1c1c; color: #999; font-size: 11px; cursor: pointer;
  }
  .sub-tab.active { background: #1e3a5f; border-color: #2563eb; color: #93c5fd; }
  .sub-tab.public  { }
  .sub-tab.private { }
  .sub-tab.notbm   { }

  /* ── Main ── */
  #main { flex: 1; display: flex; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: 200px; flex-shrink: 0;
    background: #161616; border-right: 1px solid #2a2a2a;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar-header {
    padding: 6px 12px; font-size: 11px; color: #666;
    text-transform: uppercase; letter-spacing: 0.05em;
    border-bottom: 1px solid #222; flex-shrink: 0;
  }

  /* Virtual scroll container */
  #thumb-scroll {
    flex: 1; overflow-y: auto; position: relative;
  }
  #thumb-scroll::-webkit-scrollbar { width: 4px; }
  #thumb-scroll::-webkit-scrollbar-track { background: #111; }
  #thumb-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

  /* Spacer that gives the scroll container its full logical height */
  #thumb-spacer { width: 1px; }

  /* Content window — absolutely positioned, only holds visible rows */
  #thumb-content { position: absolute; top: 0; left: 0; right: 0; }

  .thumb-item {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 6px; cursor: pointer; font-size: 11px; color: #888;
    border: 1px solid transparent; border-radius: 4px;
    height: 52px; /* ITEM_HEIGHT — must match JS constant */
  }
  .thumb-item:hover { background: #222; }
  .thumb-item.active { background: #1e3a5f; border-color: #2563eb; color: #fff; }
  .thumb-item img {
    width: 40px; height: 40px; object-fit: cover;
    border-radius: 2px; flex-shrink: 0; background: #222;
  }
  .thumb-meta { overflow: hidden; }
  .thumb-name {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;
  }
  .thumb-label { font-size: 10px; margin-top: 1px; }
  .label-public  { color: #4ade80; }
  .label-private { color: #f472b6; }
  .label-not-bm  { color: #f87171; }
  .label-skip    { color: #555; }

  /* ── Viewer ── */
  #viewer { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #image-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative; background: #0a0a0a;
  }
  #main-img {
    max-width: 100%; max-height: 100%; object-fit: contain;
    display: block; transition: opacity 0.1s;
  }
  #main-img.loading { opacity: 0.3; }
  #no-images { color: #555; font-size: 18px; text-align: center; }
  #image-info {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 4px;
    font-size: 11px; color: #aaa; white-space: nowrap; pointer-events: none;
  }

  /* ── Controls ── */
  #controls {
    display: flex; flex-direction: column; gap: 8px; padding: 12px 16px;
    background: #1a1a1a; border-top: 1px solid #333; flex-shrink: 0;
  }
  #label-buttons { display: flex; gap: 8px; justify-content: center; }
  .label-btn {
    flex: 1; max-width: 220px; padding: 10px 12px;
    border: 2px solid transparent; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: transform 0.08s, filter 0.08s;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .label-btn:active { transform: scale(0.97); }
  .label-btn .shortcut { font-size: 10px; font-weight: 400; opacity: 0.6; }
  #btn-public  { background: #14532d; border-color: #22c55e; color: #4ade80; }
  #btn-private { background: #500724; border-color: #ec4899; color: #f472b6; }
  #btn-not-bm  { background: #450a0a; border-color: #ef4444; color: #f87171; }
  #btn-public:hover  { background: #166534; }
  #btn-private:hover { background: #831843; }
  #btn-not-bm:hover  { background: #7f1d1d; }
  .label-btn.selected { filter: brightness(1.4); transform: scale(1.02); }

  #nav-buttons { display: flex; gap: 8px; justify-content: center; align-items: center; }
  .nav-btn {
    padding: 6px 16px; background: #2a2a2a; border: 1px solid #444;
    border-radius: 6px; color: #ccc; font-size: 13px; cursor: pointer;
  }
  .nav-btn:hover { background: #333; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  #btn-skip {
    padding: 6px 16px; background: #222; border: 1px solid #555;
    border-radius: 6px; color: #888; font-size: 13px; cursor: pointer;
  }
  #btn-skip:hover { background: #2a2a2a; color: #aaa; }
  #btn-undo {
    padding: 6px 12px; background: #1a1a1a; border: 1px solid #444;
    border-radius: 6px; color: #666; font-size: 12px; cursor: pointer;
  }
  #btn-undo:hover:not(:disabled) { background: #2a2a2a; color: #aaa; }
  #btn-undo:disabled { opacity: 0.3; cursor: default; }
  #position-indicator { font-size: 12px; color: #666; min-width: 80px; text-align: center; }

  /* ── Rating row ── */
  #rating-row {
    display: none; justify-content: center; align-items: center; gap: 10px;
  }
  #rating-row.visible { display: flex; }
  #rating-row-label { font-size: 12px; color: #666; }
  .rating-btn {
    flex: 1; max-width: 140px;
    padding: 6px 10px; border-radius: 6px; border: 1px solid #444;
    background: #1c1c1c; color: #888; font-size: 13px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    transition: background 0.08s;
  }
  .rating-btn .shortcut { font-size: 10px; opacity: 0.5; }
  .rating-btn:hover { background: #2a2a2a; }
  .rating-btn.active {
    background: #451a03; border-color: #d97706; color: #fcd34d;
  }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #333; color: #fff; padding: 8px 20px;
    border-radius: 6px; font-size: 13px;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #help {
    position: fixed; bottom: 8px; right: 12px;
    font-size: 10px; color: #444; line-height: 1.6; pointer-events: none;
  }
</style>
</head>
<body>

<div id="topbar">
  <span id="progress-text">読み込み中...</span>
  <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
  <div id="filter-tabs">
    <button class="tab-btn active" data-filter="unlabeled">未ラベル</button>
    <button class="tab-btn" data-filter="labeled">ラベル済み</button>
    <button class="tab-btn" data-filter="skipped">スキップ</button>
    <button class="tab-btn" data-filter="all">全て</button>
  </div>
</div>
<div id="subbar">
  <span id="subbar-label">ラベル絞込:</span>
  <button class="sub-tab active" data-label="all">全て</button>
  <button class="sub-tab public"  data-label="pixiv_public">public</button>
  <button class="sub-tab private" data-label="pixiv_private">private</button>
  <button class="sub-tab notbm"   data-label="not_bookmarked">not_bm</button>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-header">画像一覧 <span id="sidebar-count" style="color:#555"></span></div>
    <div id="thumb-scroll">
      <div id="thumb-spacer"></div>
      <div id="thumb-content"></div>
    </div>
  </div>

  <div id="viewer">
    <div id="image-area">
      <img id="main-img" src="" alt="" style="display:none">
      <div id="no-images" style="display:none">表示できる画像がありません</div>
      <div id="image-info"></div>
    </div>
    <div id="controls">
      <div id="rating-row">
        <span id="rating-row-label">強度:</span>
        <button class="rating-btn" data-rating="1" onclick="applyRating(1)">★ 弱<span class="shortcut">4</span></button>
        <button class="rating-btn" data-rating="2" onclick="applyRating(2)">★★ 中<span class="shortcut">5</span></button>
        <button class="rating-btn" data-rating="3" onclick="applyRating(3)">★★★ 強<span class="shortcut">6</span></button>
      </div>
      <div id="label-buttons">
        <button class="label-btn" id="btn-public"  onclick="applyLabel('pixiv_public')">
          pixiv_public<span class="shortcut">1 / Q</span>
        </button>
        <button class="label-btn" id="btn-private" onclick="applyLabel('pixiv_private')">
          pixiv_private<span class="shortcut">2 / W</span>
        </button>
        <button class="label-btn" id="btn-not-bm"  onclick="applyLabel('not_bookmarked')">
          not_bookmarked<span class="shortcut">3 / E</span>
        </button>
      </div>
      <div id="nav-buttons">
        <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← 前</button>
        <span id="position-indicator">-/-</span>
        <button class="nav-btn" id="btn-next" onclick="navigate(1)">次 →</button>
        <button id="btn-skip" onclick="skipImage()">スキップ (S)</button>
        <button id="btn-undo" onclick="undo()" disabled>↩ Undo (Ctrl+Z)</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="help">1/Q: public &nbsp; 2/W: private &nbsp; 3/E: not_bm &nbsp; S: skip &nbsp; 4/5/6: 強度 &nbsp; ←/→: 移動 &nbsp; Ctrl+Z: undo</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const ITEM_HEIGHT = 52;   // px — must match CSS .thumb-item height
const OVERSCAN    = 8;    // extra rows to render above/below viewport

// ── State ──────────────────────────────────────────────────────────────────
let items = [];               // [{path, label, index}]  — current filtered list
let currentPos = 0;           // position within items[]
let currentFilter = "unlabeled";
let currentLabelSubFilter = "all";  // used only when currentFilter === "labeled"
let undoStack = [];           // [{path, prevLabel}]  max 30 entries
let toastTimer = null;

// ── Preload cache ──────────────────────────────────────────────────────────
const preloadCache = new Map();  // path → HTMLImageElement
const PRELOAD_AHEAD  = 3;
const PRELOAD_BEHIND = 1;

function preloadAround(pos) {
  const keep = new Set();
  for (let i = pos - PRELOAD_BEHIND; i <= pos + PRELOAD_AHEAD; i++) {
    if (i < 0 || i >= items.length || i === pos) continue;
    const path = items[i].path;
    keep.add(path);
    if (!preloadCache.has(path)) {
      const img = new Image();
      img.src = `/api/image?path=${encodeURIComponent(path)}`;
      preloadCache.set(path, img);
    }
  }
  // 範囲外のキャッシュを解放して VRAM/メモリを節約
  for (const path of preloadCache.keys()) {
    if (!keep.has(path)) preloadCache.delete(path);
  }
}

function clearPreloadCache() {
  preloadCache.clear();
}

// ── Virtual scroll state ───────────────────────────────────────────────────
const thumbScroll  = document.getElementById("thumb-scroll");
const thumbSpacer  = document.getElementById("thumb-spacer");
const thumbContent = document.getElementById("thumb-content");
let renderedStart = -1;
let renderedEnd   = -1;

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  await refreshStatus();
  await loadItems(0, true);
  thumbScroll.addEventListener("scroll", onThumbScroll, { passive: true });
  window.addEventListener("resize", () => renderVirtualList());
}

// ── Progress bar ───────────────────────────────────────────────────────────
async function refreshStatus() {
  const d = await fetchJSON("/api/status");
  updateProgressBar(d);
}

function updateProgressBar(d) {
  const pct = d.total > 0 ? (d.labeled / d.total * 100).toFixed(1) : 0;
  document.getElementById("progress-bar").style.width = pct + "%";
  document.getElementById("progress-text").textContent =
    `${d.labeled} / ${d.total} ラベル済み (${pct}%) | 残り ${d.remaining}`;
}

// ── Load item list ─────────────────────────────────────────────────────────
async function loadItems(offset = 0, resetPos = false) {
  const limit = 5000;  // fetch all in one shot (just metadata, no images)
  const d = await fetchJSON(`/api/images?filter=${currentFilter}&offset=${offset}&limit=${limit}`);
  items = d.items;

  // ラベル済みタブ: 降順（データセット順の逆）＋ラベルサブフィルタ
  if (currentFilter === "labeled") {
    items.reverse();
    if (currentLabelSubFilter !== "all") {
      items = items.filter(item => item.label === currentLabelSubFilter);
    }
  }

  document.getElementById("sidebar-count").textContent = `(${items.length})`;

  if (resetPos) currentPos = 0;
  clearPreloadCache();
  renderedStart = renderedEnd = -1;  // force re-render
  updateVirtualHeight();
  renderVirtualList();
  showItem(currentPos);
}

// ── Virtual scroll ─────────────────────────────────────────────────────────
function updateVirtualHeight() {
  thumbSpacer.style.height = (items.length * ITEM_HEIGHT) + "px";
}

function onThumbScroll() {
  renderVirtualList();
}

function renderVirtualList() {
  if (items.length === 0) {
    thumbContent.innerHTML = '<div style="padding:12px;color:#555;font-size:12px;">画像なし</div>';
    renderedStart = renderedEnd = -1;
    return;
  }

  const scrollTop   = thumbScroll.scrollTop;
  const viewHeight  = thumbScroll.clientHeight;

  const rawStart = Math.floor(scrollTop / ITEM_HEIGHT);
  const rawEnd   = Math.ceil((scrollTop + viewHeight) / ITEM_HEIGHT);

  const start = Math.max(0, rawStart - OVERSCAN);
  const end   = Math.min(items.length - 1, rawEnd + OVERSCAN);

  // Skip re-render if the visible window hasn't changed
  if (start === renderedStart && end === renderedEnd) return;
  renderedStart = start;
  renderedEnd   = end;

  thumbContent.style.transform = `translateY(${start * ITEM_HEIGHT}px)`;

  const frag = document.createDocumentFragment();
  for (let i = start; i <= end; i++) {
    frag.appendChild(createThumbEl(items[i], i));
  }
  thumbContent.replaceChildren(frag);
}

function createThumbEl(item, pos) {
  const div = document.createElement("div");
  div.className = "thumb-item" + (pos === currentPos ? " active" : "");
  div.dataset.pos = pos;

  const filename = item.path.split("/").pop();
  const labelCls = labelClass(item.label);
  const labelTxt = item.label ? labelShort(item.label) : "";
  const ratingTxt = item.rating && isRatable(item.label) ? "★".repeat(item.rating) : "";

  const thumbUrl = `/api/thumbnail?path=${encodeURIComponent(item.path)}`;
  div.innerHTML = `
    <img src="${thumbUrl}" width="40" height="40"
         loading="lazy" decoding="async"
         onerror="this.style.visibility='hidden'">
    <div class="thumb-meta">
      <div class="thumb-name" title="${filename}">${filename}</div>
      <div class="thumb-label ${labelCls}">${labelTxt}${ratingTxt ? " " + ratingTxt : ""}</div>
    </div>`;
  div.onclick = () => { currentPos = pos; showItem(pos); };
  return div;
}

// Refresh only the affected row without full re-render
function patchVirtualRow(pos) {
  const els = thumbContent.querySelectorAll(".thumb-item");
  const offset = renderedStart;
  const el = els[pos - offset];
  if (!el) return;
  const item = items[pos];
  const ratingTxt = item.rating && isRatable(item.label) ? " " + "★".repeat(item.rating) : "";
  el.querySelector(".thumb-label").className = "thumb-label " + labelClass(item.label);
  el.querySelector(".thumb-label").textContent = (item.label ? labelShort(item.label) : "") + ratingTxt;
  el.classList.toggle("active", pos === currentPos);
}

// Scroll sidebar to keep active item visible
function scrollSidebarToActive() {
  const targetScrollTop = currentPos * ITEM_HEIGHT - thumbScroll.clientHeight / 2 + ITEM_HEIGHT / 2;
  thumbScroll.scrollTop = Math.max(0, targetScrollTop);
  // renderVirtualList will be triggered by the scroll event
}

// ── Show image ─────────────────────────────────────────────────────────────
function showItem(pos) {
  const img   = document.getElementById("main-img");
  const noImg = document.getElementById("no-images");
  const info  = document.getElementById("image-info");

  if (items.length === 0) {
    img.style.display = "none";
    noImg.style.display = "block";
    info.textContent = "";
    document.getElementById("position-indicator").textContent = "0/0";
    setButtonSelected(null);
    return;
  }

  pos = Math.max(0, Math.min(items.length - 1, pos));
  const prevPos = currentPos;
  currentPos = pos;

  const item = items[pos];

  img.classList.add("loading");
  img.style.display = "block";
  noImg.style.display = "none";
  img.onload  = () => img.classList.remove("loading");
  img.onerror = () => { img.classList.remove("loading"); };
  img.src = `/api/image?path=${encodeURIComponent(item.path)}`;

  const dirPart = item.path.replace("/mnt/cache/danbooru-ml-classifier/images/", "");
  info.textContent = dirPart;

  document.getElementById("position-indicator").textContent = `${pos + 1} / ${items.length}`;
  document.getElementById("btn-prev").disabled = pos === 0;
  document.getElementById("btn-next").disabled = pos === items.length - 1;

  setButtonSelected(item.label);
  updateRatingRow(item.label, item.rating);

  // Update active state in virtual list
  if (renderedStart >= 0) {
    patchVirtualRow(prevPos);
    patchVirtualRow(pos);
  }
  scrollSidebarToActive();

  // 前後の画像をバックグラウンドでプリロード
  preloadAround(pos);
}

function setButtonSelected(label) {
  document.getElementById("btn-public").classList.toggle("selected",  label === "pixiv_public");
  document.getElementById("btn-private").classList.toggle("selected", label === "pixiv_private");
  document.getElementById("btn-not-bm").classList.toggle("selected",  label === "not_bookmarked");
}

function updateRatingRow(label, rating) {
  const row = document.getElementById("rating-row");
  const visible = isRatable(label);
  row.classList.toggle("visible", visible);
  if (visible) setRatingSelected(rating ?? 1);
}

function setRatingSelected(rating) {
  document.querySelectorAll(".rating-btn").forEach(btn => {
    btn.classList.toggle("active", parseInt(btn.dataset.rating) === rating);
  });
}

// ── Undo stack ────────────────────────────────────────────────────────────
// prevEntry: {label, rating} | null (null = was unlabeled before the operation)
function pushUndo(path, prevEntry) {
  undoStack.push({ path, prevEntry: prevEntry ? { ...prevEntry } : null });
  if (undoStack.length > 30) undoStack.shift();
  document.getElementById("btn-undo").disabled = false;
}

async function undo() {
  if (undoStack.length === 0) { showToast("元に戻す操作がありません"); return; }
  const { path, prevEntry } = undoStack.pop();
  document.getElementById("btn-undo").disabled = undoStack.length === 0;

  if (!prevEntry) {
    await postJSON("/api/unlabel", { path });
  } else {
    await postJSON("/api/label", { path, label: prevEntry.label, rating: prevEntry.rating ?? 1 });
  }

  // 現在のリストにそのパスがあれば UI を更新
  const idx = items.findIndex(item => item.path === path);
  if (idx !== -1) {
    items[idx].label  = prevEntry?.label  ?? null;
    items[idx].rating = prevEntry?.rating ?? null;
    patchVirtualRow(idx);
    if (idx === currentPos) {
      setButtonSelected(prevEntry?.label ?? null);
      updateRatingRow(prevEntry?.label ?? null, prevEntry?.rating ?? null);
    }
  }

  await refreshStatus();
  showToast("元に戻しました");
}

// ── Labeling ───────────────────────────────────────────────────────────────
function isRatable(label) {
  return label === "pixiv_public" || label === "pixiv_private";
}

async function applyLabel(label) {
  if (items.length === 0) return;
  const item = items[currentPos];

  if (item.label === label) {
    await removeLabel(item);
    return;
  }

  // ラベル変更時はデフォルト rating=1 で保存
  const d = await postJSON("/api/label", { path: item.path, label, rating: 1 });
  if (!d.ok) { showToast("エラー: " + d.error); return; }

  pushUndo(item.path, item.label != null ? { label: item.label, rating: item.rating } : null);
  item.label  = label;
  item.rating = isRatable(label) ? 1 : null;
  setButtonSelected(label);
  updateRatingRow(label, item.rating);
  patchVirtualRow(currentPos);
  updateProgressBar({ labeled: d.labeled, total: d.total, remaining: d.total - d.labeled });
  showToast(labelShort(label) + " を保存しました");

  if (currentFilter === "unlabeled") {
    setTimeout(autoAdvance, 150);
  }
}

async function removeLabel(item) {
  const d = await postJSON("/api/unlabel", { path: item.path });
  if (!d.ok) return;
  pushUndo(item.path, { label: item.label, rating: item.rating });
  item.label  = null;
  item.rating = null;
  setButtonSelected(null);
  updateRatingRow(null, null);
  patchVirtualRow(currentPos);
  await refreshStatus();
  showToast("ラベルを削除しました");
}

async function skipImage() {
  if (items.length === 0) return;
  const item = items[currentPos];
  const d = await postJSON("/api/label", { path: item.path, label: "__skip__" });
  if (!d.ok) return;
  pushUndo(item.path, item.label != null ? { label: item.label, rating: item.rating } : null);
  item.label  = "__skip__";
  item.rating = null;
  updateRatingRow(null, null);
  patchVirtualRow(currentPos);
  showToast("スキップしました");
  if (currentFilter === "unlabeled") {
    setTimeout(autoAdvance, 150);
  }
}

async function applyRating(rating) {
  if (items.length === 0) return;
  const item = items[currentPos];
  if (!isRatable(item.label)) return;

  const d = await postJSON("/api/rating", { path: item.path, rating });
  if (!d.ok) { showToast("エラー: " + d.error); return; }

  pushUndo(item.path, { label: item.label, rating: item.rating ?? 1 });
  item.rating = rating;
  setRatingSelected(rating);
  patchVirtualRow(currentPos);
  showToast("★".repeat(rating) + " で保存しました");
}

function autoAdvance() {
  if (currentFilter === "unlabeled" && items[currentPos]?.label) {
    items.splice(currentPos, 1);
    updateVirtualHeight();
    renderedStart = renderedEnd = -1;
    renderVirtualList();
    currentPos = Math.min(currentPos, items.length - 1);
    showItem(currentPos);
  } else {
    navigate(1);
  }
}

// ── Navigation ────────────────────────────────────────────────────────────
function navigate(delta) {
  const newPos = currentPos + delta;
  if (newPos < 0 || newPos >= items.length) return;
  showItem(newPos);
}

// ── Filter tabs ───────────────────────────────────────────────────────────
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.onclick = async () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    // サブフィルタバーはラベル済みタブのときのみ表示
    document.getElementById("subbar").classList.toggle("visible", currentFilter === "labeled");
    await loadItems(0, true);
  };
});

// ── Sub-filter tabs (labeled のみ) ────────────────────────────────────────
document.querySelectorAll(".sub-tab").forEach(btn => {
  btn.onclick = async () => {
    document.querySelectorAll(".sub-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentLabelSubFilter = btn.dataset.label;
    await loadItems(0, true);
  };
});

// ── Keyboard shortcuts ────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if ((e.ctrlKey || e.metaKey) && (e.key === "z" || e.key === "Z")) {
    e.preventDefault();
    undo();
    return;
  }
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  switch (e.key) {
    case "1": case "q": case "Q": applyLabel("pixiv_public");   break;
    case "2": case "w": case "W": applyLabel("pixiv_private");  break;
    case "3": case "e": case "E": applyLabel("not_bookmarked"); break;
    case "s": case "S":           skipImage();                  break;
    case "4": applyRating(1); break;
    case "5": applyRating(2); break;
    case "6": applyRating(3); break;
    case "ArrowLeft":  case "ArrowUp":   navigate(-1); break;
    case "ArrowRight": case "ArrowDown": navigate(1);  break;
  }
});

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1500);
}

// ── Label helpers ─────────────────────────────────────────────────────────
function labelClass(label) {
  if (label === "pixiv_public")   return "label-public";
  if (label === "pixiv_private")  return "label-private";
  if (label === "not_bookmarked") return "label-not-bm";
  if (label === "__skip__")       return "label-skip";
  return "";
}
function labelShort(label) {
  if (label === "pixiv_public")   return "public";
  if (label === "pixiv_private")  return "private";
  if (label === "not_bookmarked") return "not_bm";
  if (label === "__skip__")       return "skip";
  return label;
}

// ── Fetch helpers ─────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url);
  return r.json();
}
async function postJSON(url, body) {
  const r = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  return r.json();
}

// ── Start ─────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
